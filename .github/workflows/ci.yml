name: CI

# push runs CI for commits landing directly on main (e.g. a squash merge);
# pull_request runs it for every commit on a PR branch, which is what the
# branch protection ruleset actually requires before merge. Scoping push to
# main avoids running the same commit through CI twice — once as a bare
# push and once as a pull_request synchronize event — while a PR is open.
on:
  push:
    branches: [main]
  pull_request:

# No permissions by default. Each job declares only what it needs.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Step 1 — Ruleset check
  # Validates that the default branch has all required protection rules active.
  # Fails immediately if not. Blocks the pipeline job.
  # ---------------------------------------------------------------------------
  ruleset:
    name: Ruleset check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22.23.0'

      - name: Validate ruleset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tools/build/ruleset/check.js

  # ---------------------------------------------------------------------------
  # Step 1b — Dependency policy check
  # Rejects any dependency (direct or transitive) whose install step runs a
  # script — i.e. isn't fully covered by npm ci's pinned integrity check.
  # No allow-list. Fails immediately if any are found. Blocks the pipeline job.
  # ---------------------------------------------------------------------------
  dependency-policy:
    name: Dependency policy check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22.23.0'

      - name: Check dependency policy
        run: node tools/build/dependency-policy/check.js

  # ---------------------------------------------------------------------------
  # Steps 2–7 — CI pipeline
  # Runs only after the ruleset and dependency policy checks pass.
  # ---------------------------------------------------------------------------
  pipeline:
    name: Pipeline
    needs: [ruleset, dependency-policy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22.23.0'

      # Step 2 — Install dependencies
      # npm ci verifies the sha512 integrity hash of every package before
      # installation. Any tampering with package-lock.json causes this to fail.
      - name: Install dependencies
        run: npm ci

      # Step 3 — Lint and format
      - name: Lint and format (Biome)
        run: npm run lint

      # Step 4 — Type check
      - name: Type check
        run: npm run typecheck

      # Step 5 — Test suite
      - name: Test
        run: npm test

      # Step 6 — Build distributables
      # The root build script builds argon2 and chacha20, then kdbx, then pages,
      # in that dependency order — pages' bundler reads their compiled build/
      # output, so they must exist first.
      - name: Build distributables
        run: npm run build

      # Step 7 — Checksums
      # Surfaces each distributable's checksum in the workflow summary. For
      # tagged releases, these values are attached to the GitHub release as the
      # published checksums that third parties verify against.
      #
      # The inliner prints "sha256:<hex>  <output path>"; only the first
      # whitespace-separated field is the checksum itself.
      - name: Record checksums
        run: |
          printf -- '### Distributable checksums\n' >> "$GITHUB_STEP_SUMMARY"
          for page in index router 0x67 cloud-google-drive; do
            checksum=$(node --experimental-strip-types tools/build/inliner/src/index.ts "pages/${page}/build.json" | awk '{print $1}')
            printf -- '- `%s.html`: `%s`\n' "${page}" "${checksum}" >> "$GITHUB_STEP_SUMMARY"
          done
