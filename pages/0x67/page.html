<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeePass Web</title>
  <!--STYLES-->
</head>
<body>
  <!-- Live screen container -->
  <div id="root"></div>

  <!-- ============================================================
       Screen: Upload
       ============================================================ -->
  <template id="tpl-upload">
    <div class="screen screen-upload">
      <div class="wordmark">KeePass Web</div>
      <div id="drop-zone" class="drop-zone">
        <div class="drop-zone-icon">🔑</div>
        <p class="drop-zone-label">Drop your .kdbx file here</p>
        <label class="btn btn-primary">
          Choose file
          <input type="file" id="file-input" accept=".kdbx,.kdb" hidden>
        </label>
        <button type="button" class="back-link" data-action="create-database">Create a new database</button>
      </div>
    </div>
  </template>

  <!-- ============================================================
       Screen: Unlock
       ============================================================ -->
  <template id="tpl-unlock">
    <div class="screen screen-unlock">
      <button type="button" class="back-link" data-action="back">← Back</button>
      <div class="wordmark">KeePass Web</div>
      <h1 id="db-filename" class="db-filename">Database</h1>
      <form id="unlock-form" class="unlock-form" novalidate>
        <div class="field">
          <label for="master-password">Master password</label>
          <div class="password-field-wrap">
            <input type="password" id="master-password" autocomplete="current-password">
            <button type="button" class="icon-btn" data-action="toggle-password" title="Show / hide">👁</button>
          </div>
        </div>
        <div class="field">
          <span class="field-label">Key file <span class="optional">(optional)</span></span>
          <label class="file-pick">
            <span id="keyfile-label">No file chosen</span>
            <input type="file" id="keyfile-input" hidden>
          </label>
        </div>
        <div id="unlock-error" class="error-msg" hidden></div>
        <button type="submit" id="unlock-btn" class="btn btn-primary btn-block">Unlock</button>
      </form>
    </div>
  </template>

  <!-- ============================================================
       Screen: Create Database
       ============================================================ -->
  <template id="tpl-create-database">
    <div class="screen screen-unlock">
      <button type="button" class="back-link" data-action="back">← Back</button>
      <div class="wordmark">KeePass Web</div>
      <h1 class="db-filename">New database</h1>
      <form id="create-form" class="unlock-form" novalidate>
        <div class="field">
          <label for="create-name">Database name</label>
          <input type="text" id="create-name" autocomplete="off" value="Database">
        </div>
        <div class="field">
          <label for="create-password">Master password</label>
          <input type="password" id="create-password" autocomplete="new-password">
        </div>
        <div class="field">
          <label for="create-password-confirm">Confirm master password</label>
          <input type="password" id="create-password-confirm" autocomplete="new-password">
        </div>
        <div class="field">
          <span class="field-label">Key file <span class="optional">(optional)</span></span>
          <label class="file-pick">
            <span id="create-keyfile-label">No file chosen</span>
            <input type="file" id="create-keyfile-input" hidden>
          </label>
        </div>
        <div id="create-error" class="error-msg" hidden></div>
        <button type="submit" id="create-btn" class="btn btn-primary btn-block">Create</button>
      </form>
    </div>
  </template>

  <!-- ============================================================
       Screen: Entry List (main app)
       ============================================================ -->
  <template id="tpl-entry-list">
    <div class="screen screen-app">
      <header class="app-header">
        <span class="wordmark">KeePass Web</span>
        <div class="search-wrap">
          <input type="search" id="search-input" class="search-input" placeholder="Search all entries…" autocomplete="off">
        </div>
        <div class="header-actions">
          <button type="button" class="icon-btn" data-action="settings" title="Settings">⚙</button>
          <button type="button" class="icon-btn" data-action="lock" title="Lock">🔒</button>
          <button type="button" class="icon-btn" data-action="close" title="Close">✕</button>
        </div>
      </header>
      <div class="app-body">
        <aside class="sidebar">
          <div class="sidebar-header">
            <span class="sidebar-label">Groups</span>
            <button type="button" class="icon-btn" data-action="add-group" title="New group">+</button>
          </div>
          <nav id="group-tree" class="group-tree"></nav>
        </aside>
        <main class="entry-panel">
          <div class="panel-header">
            <span id="panel-title" class="panel-title"></span>
            <button type="button" class="icon-btn" data-action="add-entry" title="New entry">+</button>
          </div>
          <div id="entry-list" class="entry-list"></div>
        </main>
      </div>
    </div>
  </template>

  <!-- ============================================================
       Screen: Entry Detail
       ============================================================ -->
  <template id="tpl-entry-detail">
    <div class="screen screen-detail">
      <header class="detail-header">
        <button type="button" class="back-link" data-action="back">← Entries</button>
        <div class="detail-header-actions">
          <button type="button" class="btn btn-secondary" data-action="edit">Edit</button>
          <button type="button" class="btn btn-secondary" data-action="restore" hidden>Restore</button>
          <button type="button" class="btn btn-danger" data-action="trash">Trash</button>
          <button type="button" class="btn btn-danger" data-action="delete" hidden>Delete</button>
        </div>
      </header>
      <div class="detail-body">
        <h1 id="detail-title" class="detail-title">Entry</h1>
        <div id="detail-tags" class="tag-chips"></div>
        <div id="detail-fields" class="detail-fields"></div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       Screen: Entry Edit
       ============================================================ -->
  <template id="tpl-entry-edit">
    <div class="screen screen-edit">
      <header class="edit-header">
        <button type="button" class="back-link" data-action="cancel">Cancel</button>
        <h1 id="edit-title" class="edit-title">Edit Entry</h1>
        <button type="button" class="btn btn-primary" data-action="save">Save</button>
      </header>
      <div class="edit-body">
        <button type="button" class="icon-picker-btn" id="edit-icon-btn" title="Choose icon"></button>
        <div class="field">
          <label for="edit-tags">Tags <span class="optional">(comma or semicolon separated)</span></label>
          <input type="text" id="edit-tags" autocomplete="off" placeholder="Work, Personal">
        </div>
        <div id="edit-fields" class="edit-fields"></div>
        <button type="button" class="btn btn-secondary btn-add-field" data-action="add-field">+ Add field</button>
      </div>
    </div>
  </template>

  <!-- ============================================================
       Dialog: Settings
       ============================================================ -->
  <dialog id="dlg-settings" class="kw-dialog">
    <div class="dialog-header">
      <h2>Settings</h2>
      <button type="button" class="close-btn" data-action="close">✕</button>
    </div>
    <div class="dialog-body">
      <div class="field">
        <label for="clipboard-timeout">Clipboard clear timeout (seconds)</label>
        <input type="number" id="clipboard-timeout" min="5" max="300" value="30">
      </div>
    </div>
    <div class="dialog-footer">
      <button type="button" class="btn btn-primary" data-action="save-settings">Save</button>
    </div>
  </dialog>

  <!-- ============================================================
       Dialog: Save / Download
       ============================================================ -->
  <dialog id="dlg-save" class="kw-dialog">
    <div class="dialog-header">
      <h2>Save database</h2>
      <button type="button" class="close-btn" data-action="close">✕</button>
    </div>
    <div class="dialog-body">
      <p data-role="save-local">Download the updated database file to your computer.</p>
      <p data-role="save-host" hidden>Save the updated database back to Google Drive.</p>
      <p class="save-status" data-role="save-status" hidden></p>
    </div>
    <div class="dialog-footer">
      <button type="button" class="btn btn-secondary" data-action="close">Later</button>
      <button type="button" class="btn btn-primary" data-action="download">Download</button>
      <button type="button" class="btn btn-primary" data-action="save-host" hidden>Save to Drive</button>
    </div>
  </dialog>

  <!-- ============================================================
       Dialog: Confirm Delete
       ============================================================ -->
  <dialog id="dlg-confirm-delete" class="kw-dialog">
    <div class="dialog-header">
      <h2>Delete entry?</h2>
    </div>
    <div class="dialog-body">
      <p>This cannot be undone.</p>
    </div>
    <div class="dialog-footer">
      <button type="button" class="btn btn-secondary" data-action="cancel-delete">Cancel</button>
      <button type="button" class="btn btn-danger" data-action="confirm-delete">Delete</button>
    </div>
  </dialog>

  <!-- ============================================================
       Dialog: Generate Password
       ============================================================ -->
  <dialog id="dlg-generate-password" class="kw-dialog">
    <div class="dialog-header">
      <h2>Generate password</h2>
      <button type="button" class="close-btn" data-action="close">✕</button>
    </div>
    <div class="dialog-body">
      <div class="generator-preview" id="generator-preview"></div>
      <div class="field">
        <label for="generator-length">Length</label>
        <input type="number" id="generator-length" min="4" max="128" value="20">
      </div>
      <div class="generator-checkboxes">
        <label><input type="checkbox" id="generator-upper" checked> Uppercase (A-Z)</label>
        <label><input type="checkbox" id="generator-lower" checked> Lowercase (a-z)</label>
        <label><input type="checkbox" id="generator-digits" checked> Digits (0-9)</label>
        <label><input type="checkbox" id="generator-symbols"> Symbols (!@#$%…)</label>
      </div>
      <div id="generator-error" class="error-msg" hidden></div>
    </div>
    <div class="dialog-footer">
      <button type="button" class="btn btn-secondary" data-action="regenerate">Regenerate</button>
      <button type="button" class="btn btn-primary" data-action="use-password">Use this password</button>
    </div>
  </dialog>

  <!-- ============================================================
       Dialog: Confirm Discard
       ============================================================ -->
  <dialog id="dlg-confirm-discard" class="kw-dialog">
    <div class="dialog-header">
      <h2>Discard unsaved changes?</h2>
    </div>
    <div class="dialog-body">
      <p>You have unsaved changes that will be lost.</p>
    </div>
    <div class="dialog-footer">
      <button type="button" class="btn btn-secondary" data-action="cancel-discard">Cancel</button>
      <button type="button" class="btn btn-danger" data-action="confirm-discard">Discard</button>
    </div>
  </dialog>

  <!-- ============================================================
       Dialog: New Group
       ============================================================ -->
  <dialog id="dlg-new-group" class="kw-dialog">
    <div class="dialog-header">
      <h2>New group</h2>
      <button type="button" class="close-btn" data-action="close">✕</button>
    </div>
    <div class="dialog-body">
      <button type="button" class="icon-picker-btn" id="new-group-icon-btn" title="Choose icon"></button>
      <div class="field">
        <label for="new-group-name">Group name</label>
        <input type="text" id="new-group-name" autocomplete="off">
      </div>
    </div>
    <div class="dialog-footer">
      <button type="button" class="btn btn-secondary" data-action="cancel-group">Cancel</button>
      <button type="button" class="btn btn-primary" data-action="create-group">Create</button>
    </div>
  </dialog>

  <!-- ============================================================
       Dialog: Icon Picker
       ============================================================ -->
  <dialog id="dlg-icon-picker" class="kw-dialog">
    <div class="dialog-header">
      <h2>Choose an icon</h2>
      <button type="button" class="close-btn" data-action="close">✕</button>
    </div>
    <div class="dialog-body">
      <div id="icon-grid" class="icon-grid"></div>
    </div>
  </dialog>

  <!--SCRIPTS-->
</body>
</html>
